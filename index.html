<!DOCTYPE html>
<html>
<head>
  <title>Compact Sales Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 8px;
      background: #f4f4f4;
    }

    h1, h2, h3 {
      text-align: center;
      margin: 5px 0;
    }

    .section {
      background: white;
      padding: 8px;
      margin-bottom: 7px;
      border-radius: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    button, input {
      padding: 9px;
      font-size: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      width: 100%;
      box-sizing: border-box;
      margin-top: 4px;
    }

    button {
      border: none;
      background: #ddd;
      cursor: pointer;
    }

    .quantity-menu {
      display: none;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
      margin-top: 4px;
    }

    .quantity-menu.open {
      display: grid;
    }

    .quantity-menu button {
      background: #4caf50;
      color: white;
    }

    .submit {
      background: #2196f3;
      color: white;
      font-size: 18px;
      padding: 12px;
      position: sticky;
      bottom: 0;
      z-index: 10;
    }

    .danger {
      background: #e53935;
      color: white;
    }

    .selected {
      background: #4caf50;
      color: white;
    }

    .cart-item, .sale, .employee-tag {
      border-bottom: 1px solid #ccc;
      padding: 5px 0;
      font-size: 13px;
    }

    .total {
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      margin: 2px 0;
    }

    .qr {
      width: 150px;
      display: block;
      margin: 8px auto;
      border-radius: 8px;
    }

    .payment-details {
      text-align: center;
      font-size: 14px;
      margin-top: 6px;
    }
  </style>
</head>

<body>

<h1>Sales Tracker</h1>

<div class="section">
  <h2 class="total">$<span id="cartTotal">0.00</span></h2>
</div>

<div class="section">
  <h3>Products</h3>

  <button onclick="toggleQuantityMenu('Thai Tea', 5)">Thai Tea $5</button>
  <div id="Thai Tea-menu" class="quantity-menu"></div>

  <button onclick="toggleQuantityMenu('Cookie', 3)">Cookie $3</button>
  <div id="Cookie-menu" class="quantity-menu"></div>

  <button onclick="toggleQuantityMenu('Combo', 7)">Combo $7</button>
  <div id="Combo-menu" class="quantity-menu"></div>

  <button onclick="toggleQuantityMenu('Brownie', 4)">Brownie $4</button>
  <div id="Brownie-menu" class="quantity-menu"></div>
</div>

<div class="section">
  <h3>Cart</h3>
  <div id="cartLog"></div>
</div>

<div class="section">
  <h3>Payment</h3>
  <div class="grid">
    <button onclick="selectPayment('Cash', this)">Cash</button>
    <button onclick="selectPayment('Zelle', this)">Zelle</button>
    <button onclick="selectPayment('Venmo', this)">Venmo</button>
    <button onclick="selectPayment('Card', this)">Card</button>
  </div>

  <div id="paymentDetails" class="payment-details"></div>
</div>

<button class="submit" onclick="submitSale()">Submit Purchase</button>

<div class="section">
  <h3>Active Employees</h3>
  <input id="employeeInput" placeholder="Employee #">
  <button onclick="addEmployee()">Add Employee</button>
  <div id="employeeLog"></div>
</div>

<div class="section">
  <h3>Sales Log</h3>
  <button class="danger" onclick="clearSalesLog()">Clear Local Sales Log</button>
  <div id="salesLog"></div>
</div>

<script>
let cart = [];
let employees = JSON.parse(localStorage.getItem("activeEmployees")) || [];
let sales = JSON.parse(localStorage.getItem("sales")) || [];
let selectedPayment = null;

const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz9JqD4g_OYrxscyuWBSwG6dOrhoCb2KDBTJhE6ThhHBJT1QCZHwo7RBltgw4vXuEAA/exec";

function saveEmployees() {
  localStorage.setItem("activeEmployees", JSON.stringify(employees));
}

function saveSales() {
  localStorage.setItem("sales", JSON.stringify(sales));
}

function sendToGoogleSheets(sale) {
  fetch(GOOGLE_SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(sale)
  });
}

function getCartTotal() {
  return cart.reduce((sum, item) => sum + item.total, 0);
}

function toggleQuantityMenu(product, price) {
  document.querySelectorAll(".quantity-menu").forEach(menu => {
    menu.classList.remove("open");
    menu.innerHTML = "";
  });

  const menu = document.getElementById(product + "-menu");

  for (let i = 1; i <= 10; i++) {
    const button = document.createElement("button");
    button.innerText = i;
    button.onclick = () => addProduct(product, price, i);
    menu.appendChild(button);
  }

  menu.classList.add("open");
}

function addProduct(product, price, quantity) {
  const existing = cart.find(item => item.product === product);

  if (existing) {
    existing.quantity += quantity;
    existing.total = existing.price * existing.quantity;
  } else {
    cart.push({
      product: product,
      price: price,
      quantity: quantity,
      total: price * quantity
    });
  }

  closeMenus();
  displayCart();
}

function closeMenus() {
  document.querySelectorAll(".quantity-menu").forEach(menu => {
    menu.classList.remove("open");
    menu.innerHTML = "";
  });
}

function displayCart() {
  const log = document.getElementById("cartLog");
  const total = getCartTotal();

  log.innerHTML = "";

  cart.forEach((item, index) => {
    const div = document.createElement("div");
    div.className = "cart-item";

    div.innerHTML = `
      ${item.product} x${item.quantity} = $${item.total.toFixed(2)}
      <button class="danger" onclick="removeItem(${index})">Remove</button>
    `;

    log.appendChild(div);
  });

  document.getElementById("cartTotal").innerText = total.toFixed(2);

  if (selectedPayment) {
    showPaymentDetails(selectedPayment);
  }
}

function removeItem(index) {
  cart.splice(index, 1);
  displayCart();
}

function selectPayment(payment, button) {
  selectedPayment = payment;

  button.parentElement.querySelectorAll("button").forEach(btn => {
    btn.classList.remove("selected");
  });

  button.classList.add("selected");
  showPaymentDetails(payment);
}

function showPaymentDetails(payment) {
  const details = document.getElementById("paymentDetails");
  const total = getCartTotal();

  if (payment === "Zelle") {
    details.innerHTML = `
      <strong>Zelle Payment</strong><br>
      Total: $${total.toFixed(2)}
      <img src="zelle-qr.png" class="qr" alt="Zelle QR Code">
    `;
  }

  else if (payment === "Venmo") {
    details.innerHTML = `
      <strong>Venmo Payment</strong><br>
      Total: $${total.toFixed(2)}
      <img src="venmo-qr.png" class="qr" alt="Venmo QR Code">
    `;
  }

  else if (payment === "Cash") {
    details.innerHTML = `
      <strong>Cash Payment</strong><br>
      Total: $${total.toFixed(2)}
      <input id="cashGiven" type="number" step="0.01" placeholder="Amount given" oninput="calculateChange()">
      Change Due: $<span id="changeDue">0.00</span>
    `;
  }

  else if (payment === "Card") {
    details.innerHTML = `
      <strong>Card Payment</strong><br>
      Total: $${total.toFixed(2)}<br>
      Use card reader, then submit purchase.
    `;
  }
}

function calculateChange() {
  const total = getCartTotal();
  const cashGiven = parseFloat(document.getElementById("cashGiven").value) || 0;
  const change = cashGiven - total;

  document.getElementById("changeDue").innerText =
    change >= 0 ? change.toFixed(2) : "0.00";
}

function addEmployee() {
  const input = document.getElementById("employeeInput");
  const employee = input.value;

  if (!employee) return;

  if (!employees.includes(employee)) {
    employees.push(employee);
    saveEmployees();
  }

  input.value = "";
  displayEmployees();
}

function displayEmployees() {
  const log = document.getElementById("employeeLog");
  log.innerHTML = "";

  employees.forEach((employee, index) => {
    const div = document.createElement("div");
    div.className = "employee-tag";

    div.innerHTML = `
      Employee #${employee}
      <button class="danger" onclick="removeEmployee(${index})">Remove</button>
    `;

    log.appendChild(div);
  });
}

function removeEmployee(index) {
  employees.splice(index, 1);
  saveEmployees();
  displayEmployees();
}

function submitSale() {
  if (cart.length === 0) {
    alert("Add at least one product.");
    return;
  }

  if (!selectedPayment) {
    alert("Select payment method.");
    return;
  }

  if (employees.length === 0) {
    alert("Add employee number.");
    return;
  }

  const total = getCartTotal();
  const now = new Date();

  let cashGiven = "";
  let changeDue = "";

  if (selectedPayment === "Cash") {
    cashGiven = parseFloat(document.getElementById("cashGiven")?.value) || 0;
    changeDue = cashGiven - total;

    if (cashGiven < total) {
      alert("Cash given is less than total.");
      return;
    }
  }

  const sale = {
    items: [...cart],
    total: total,
    payment: selectedPayment,
    employees: [...employees],
    date: now.toLocaleDateString(),
    time: now.toLocaleTimeString(),
    cashGiven: cashGiven,
    changeDue: changeDue
  };

  sales.push(sale);
  saveSales();
  sendToGoogleSheets(sale);

  cart = [];
  displayCart();
  displaySales();
}

function displaySales() {
  const log = document.getElementById("salesLog");
  log.innerHTML = "";

  sales.slice().reverse().forEach(sale => {
    const items = sale.items
      .map(item => `${item.product} x${item.quantity}`)
      .join(", ");

    let cashInfo = "";

    if (sale.payment === "Cash") {
      cashInfo = `
        <br>Cash Given: $${Number(sale.cashGiven).toFixed(2)}
        <br>Change: $${Number(sale.changeDue).toFixed(2)}
      `;
    }

    const div = document.createElement("div");
    div.className = "sale";

    div.innerHTML = `
      <strong>$${sale.total.toFixed(2)}</strong><br>
      ${items}<br>
      Payment: ${sale.payment}${cashInfo}<br>
      Employees: ${sale.employees.join(", ")}<br>
      Time: ${sale.date} ${sale.time}
    `;

    log.appendChild(div);
  });
}

function clearSalesLog() {
  if (confirm("Clear local sales log on this device? This will not delete Google Sheet records.")) {
    sales = [];
    localStorage.removeItem("sales");
    displaySales();
  }
}

displayCart();
displayEmployees();
displaySales();
</script>

</body>
</html>
