<!DOCTYPE html>
<html>
<head>
  <title>Compact Sales Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 8px;
      background: #f4f4f4;
    }

    h1, h2, h3 {
      text-align: center;
      margin: 6px 0;
    }

    .section {
      background: white;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 10px;
    }

    .compact {
      padding: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    button, input {
      padding: 10px;
      font-size: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      width: 100%;
      box-sizing: border-box;
      margin-top: 4px;
    }

    button {
      border: none;
      background: #ddd;
      cursor: pointer;
    }

    .product-row {
      margin-bottom: 5px;
    }

    .quantity-menu {
      display: none;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
      margin-top: 4px;
    }

    .quantity-menu.open {
      display: grid;
    }

    .quantity-menu button {
      background: #4caf50;
      color: white;
      padding: 9px;
      font-size: 15px;
    }

    .submit {
      background: #2196f3;
      color: white;
      font-size: 18px;
      padding: 12px;
    }

    .danger {
      background: #e53935;
      color: white;
    }

    .selected {
      background: #4caf50;
      color: white;
    }

    .cart-item, .sale, .employee-tag {
      border-bottom: 1px solid #ccc;
      padding: 6px 0;
      font-size: 13px;
    }

    .total {
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      margin: 4px 0;
    }
  </style>
</head>

<body>

<h1>Sales Tracker</h1>

<div class="section">
  <h2>$<span id="cartTotal">0.00</span></h2>
</div>

<div class="section compact">
  <h3>Products</h3>

  <div class="product-row">
    <button onclick="toggleQuantityMenu('Thai Tea', 5)">Thai Tea $5</button>
    <div id="Thai Tea-menu" class="quantity-menu"></div>
  </div>

  <div class="product-row">
    <button onclick="toggleQuantityMenu('Cookie', 3)">Cookie $3</button>
    <div id="Cookie-menu" class="quantity-menu"></div>
  </div>

  <div class="product-row">
    <button onclick="toggleQuantityMenu('Combo', 7)">Combo $7</button>
    <div id="Combo-menu" class="quantity-menu"></div>
  </div>

  <div class="product-row">
    <button onclick="toggleQuantityMenu('Brownie', 4)">Brownie $4</button>
    <div id="Brownie-menu" class="quantity-menu"></div>
  </div>

</div>

<div class="section compact">
  <h3>Cart</h3>
  <div id="cartLog"></div>
</div>

<div class="section compact">
  <h3>Payment</h3>
  <div class="grid">
    <button onclick="selectPayment('Cash', this)">Cash</button>
    <button onclick="selectPayment('Zelle', this)">Zelle</button>
    <button onclick="selectPayment('Venmo', this)">Venmo</button>
    <button onclick="selectPayment('Card', this)">Card</button>
  </div>
</div>

<div class="section compact">
  <h3>Employees</h3>
  <input id="employeeInput" placeholder="Employee #">
  <button onclick="addEmployee()">Add</button>
  <div id="employeeLog"></div>
</div>

<button class="submit" onclick="submitSale()">Submit</button>

<div class="section">
  <h3>Sales Log</h3>
  <div id="salesLog"></div>
</div>

<script>
let cart = [];
let employees = JSON.parse(localStorage.getItem("activeEmployees")) || [];
let sales = JSON.parse(localStorage.getItem("sales")) || [];
let selectedPayment = null;

function saveEmployees(){
  localStorage.setItem("activeEmployees", JSON.stringify(employees));
}
function saveSales(){
  localStorage.setItem("sales", JSON.stringify(sales));
}

function toggleQuantityMenu(product, price){
  document.querySelectorAll(".quantity-menu").forEach(m=>{
    m.classList.remove("open"); m.innerHTML="";
  });

  const menu = document.getElementById(product+"-menu");

  for(let i=1;i<=10;i++){
    let b=document.createElement("button");
    b.innerText=i;
    b.onclick=()=>addProduct(product,price,i);
    menu.appendChild(b);
  }
  menu.classList.add("open");
}

function addProduct(product,price,q){
  let existing=cart.find(i=>i.product===product);
  if(existing){
    existing.quantity+=q;
    existing.total=existing.price*existing.quantity;
  } else {
    cart.push({product,price,quantity:q,total:price*q});
  }
  closeMenus();
  displayCart();
}

function closeMenus(){
  document.querySelectorAll(".quantity-menu").forEach(m=>{
    m.classList.remove("open"); m.innerHTML="";
  });
}

function displayCart(){
  let log=document.getElementById("cartLog");
  let total=0;
  log.innerHTML="";

  cart.forEach((i,idx)=>{
    total+=i.total;
    let d=document.createElement("div");
    d.className="cart-item";
    d.innerHTML=`${i.product} x${i.quantity} ($${i.total.toFixed(2)})
    <button onclick="removeItem(${idx})">X</button>`;
    log.appendChild(d);
  });

  document.getElementById("cartTotal").innerText=total.toFixed(2);
}

function removeItem(i){
  cart.splice(i,1);
  displayCart();
}

function selectPayment(p,btn){
  selectedPayment=p;
  btn.parentElement.querySelectorAll("button").forEach(b=>b.classList.remove("selected"));
  btn.classList.add("selected");
}

function addEmployee(){
  let val=document.getElementById("employeeInput").value;
  if(!val)return;
  if(!employees.includes(val)){
    employees.push(val);
    saveEmployees();
  }
  document.getElementById("employeeInput").value="";
  displayEmployees();
}

function displayEmployees(){
  let log=document.getElementById("employeeLog");
  log.innerHTML="";
  employees.forEach((e,i)=>{
    let d=document.createElement("div");
    d.className="employee-tag";
    d.innerHTML=`#${e} <button onclick="removeEmployee(${i})">X</button>`;
    log.appendChild(d);
  });
}

function removeEmployee(i){
  employees.splice(i,1);
  saveEmployees();
  displayEmployees();
}

function submitSale(){
  if(cart.length===0||!selectedPayment||employees.length===0){
    alert("Missing info"); return;
  }

  let total=cart.reduce((s,i)=>s+i.total,0);

  sales.push({
    items:[...cart],
    total,
    payment:selectedPayment,
    employees:[...employees],
    time:new Date().toLocaleString()
  });

  saveSales();
  cart=[];
  displayCart();
  displaySales();
}

function displaySales(){
  let log=document.getElementById("salesLog");
  log.innerHTML="";

  sales.slice().reverse().forEach(s=>{
    let items=s.items.map(i=>`${i.product}x${i.quantity}`).join(", ");
    let d=document.createElement("div");
    d.className="sale";
    d.innerHTML=`$${s.total} | ${items} | ${s.payment} | ${s.employees.join(",")}`;
    log.appendChild(d);
  });
}

displayCart();
displayEmployees();
displaySales();
</script>

</body>
</html>
